name: Release

# Spustí se při pushnutí tagu ve formátu v1.2.3
on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build & publish
        env:
          # GH_TOKEN umožňuje electron-builder nahrát release na GitHub
          GH_TOKEN: ${{ secrets.GH_SECRET }}
        run: npm run build:win -- --publish always
